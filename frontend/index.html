<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .contenedor { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        label { font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #e9ecef; }
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-calcular { background-color: #17a2b8; color: white; }
        .btn-registrar { background-color: #28a745; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #343a40; color: white; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Registro de Ventas</h2>

        <form id="formVenta">
            <label for="cliente">Cliente:</label>
            <input type="text" id="cliente" required>

            <label for="producto">Producto:</label>
            <input type="text" id="producto" required>

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" required>

            <label for="precio">Precio:</label>
            <input type="number" step="0.01" id="precio" required>

            <button type="button" class="btn-calcular" onclick="calcularTotal()">Calcular Total</button>

            <label for="total">Total:</label>
            <input type="text" id="total" readonly placeholder="Calcula el total antes de registrar">

            <button type="submit" class="btn-registrar">Registrar Venta</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="listaVentas">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
