<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Ventas</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .contenedor { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        label { font-weight: bold; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        input[readonly] { background-color: #e9ecef; }
        
        /* Contenedor de botones del formulario */
        .form-acciones { display: flex; gap: 10px; margin-top: 10px; }
        
        button { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; text-align: center;}
        
        /* Estilos de botones */
        .btn-calcular { background-color: #17a2b8; color: white; }
        .btn-calcular:hover { background-color: #138496; }
        
        .btn-registrar { background-color: #28a745; color: white; }
        .btn-registrar:hover { background-color: #218838; }
        
        /* Botón eliminar dentro de la tabla */
        .btn-eliminar { 
            background-color: #dc3545; 
            color: white; 
            padding: 5px 10px; 
            font-size: 12px;
            width: auto;
            flex: none;
        }
        .btn-eliminar:hover { background-color: #c82333; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px;}
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #343a40; color: white; }
        
        /* Centrar la columna de acciones */
        td.celda-acciones, th.col-acciones { text-align: center; width: 100px;}
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Sistema de Registro de Ventas</h2>

        <form id="formVenta">
            <label for="cliente">Cliente:</label>
            <input type="text" id="cliente" required placeholder="Nombre del cliente">

            <label for="producto">Producto:</label>
            <input type="text" id="producto" required placeholder="Nombre del producto">

            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" required min="1" placeholder="0">

            <label for="precio">Precio Unitario:</label>
            <input type="number" step="0.01" id="precio" required min="0.1" placeholder="0.00">

            <label for="total">Total:</label>
            <input type="text" id="total" readonly placeholder="Total calculado automáticamente">

            <div class="form-acciones">
                <button type="button" class="btn-calcular" onclick="calcularTotal()">1. Calcular Total</button>
                <button type="submit" class="btn-registrar">2. Registrar Venta</button>
            </div>
        </form>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Precio</th>
                    <th>Total</th>
                    <th class="col-acciones">Acciones</th> </tr>
            </thead>
            <tbody id="listaVentas">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
